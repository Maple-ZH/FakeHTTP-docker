name: Manual Build & Package Docker Image

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择构建平台 (Select Platform)'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export
        run: |
          platforms="${{ github.event.inputs.platform }}"
          
          # 定义构建函数
          build_fn() {
            local arch=$1
            local platform_str="linux/$arch"
            echo "正在构建架构: $platform_str"
            docker buildx build --platform "$platform_str" -t "fakehttp:$arch" --load .
            docker save "fakehttp:$arch" | gzip > "fakehttp_${arch}.tar.gz"
          }

          if [ "$platforms" == "both" ]; then
            build_fn "amd64"
            build_fn "arm64"
          else
            build_fn "$platforms"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fakehttp-binaries-${{ github.event.inputs.platform }}
          path: "*.tar.gz"
          retention-days: 5
