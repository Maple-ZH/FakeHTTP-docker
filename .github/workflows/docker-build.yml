name: Build & Release Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      platform:
        description: '选择架构'
        required: true
        default: 'both'
        type: choice
        options:
          - amd64
          - arm64
          - both

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须赋予写入权限以创建 Release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Package
        run: |
          build_fn() {
            local arch=$1
            echo "Building for linux/$arch..."
            docker buildx build --platform "linux/$arch" -t "fakehttp:$arch" --load .
            docker save "fakehttp:$arch" | gzip > "fakehttp_${arch}.tar.gz"
          }

          if [ "${{ github.event.inputs.platform }}" == "both" ]; then
            build_fn "amd64"
            build_fn "arm64"
          else
            build_fn "${{ github.event.inputs.platform }}"
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            fakehttp_amd64.tar.gz
            fakehttp_arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
