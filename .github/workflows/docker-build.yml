name: Multi-Arch Docker Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-multi-arch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 关键：设置 QEMU 模拟器，支持跨架构编译
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 同时构建两个架构并导出
      # 注意：由于 save 不直接支持多架构 manifest，我们通常分别构建或直接推送到 Registry
      # 如果非要本地导出，可以分别导出两个 tar 包
      - name: Build for x86 and ARM
        run: |
          docker buildx build --platform linux/amd64 -t fakehttp:amd64 --load .
          docker save fakehttp:amd64 | gzip > fakehttp_amd64.tar.gz
          
          docker buildx build --platform linux/arm64 -t fakehttp:arm64 --load .
          docker save fakehttp:arm64 | gzip > fakehttp_arm64.tar.gz

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fakehttp-multi-arch-images
          path: |
            fakehttp_amd64.tar.gz
            fakehttp_arm64.tar.gz
