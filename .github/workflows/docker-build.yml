name: Build and Push Multi-Arch Image to GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'

# 核心权限设置：允许推送镜像到 GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 关键修复：处理 Docker 镜像名全小写要求
      - name: Prepare Image Name
        id: prep
        run: |
          # 将仓库路径转换为全小写 (例如 Maple-ZH/FakeHTTP -> maple-zh/fakehttp)
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      # 2. 设置 QEMU (支持跨架构构建，如 ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录到 GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 同时构建 amd64 和 arm64 镜像并推送到仓库
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:${{ github.event.inputs.version }}
            ${{ steps.prep.outputs.image_name }}:latest
          # 缓存优化：加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. (可选) 同时创建 GitHub Release 挂载 tar 包
      - name: Save Docker Image to Tar (AMD64)
        run: |
          docker pull ${{ steps.prep.outputs.image_name }}:latest --platform linux/amd64
          docker save ${{ steps.prep.outputs.image_name }}:latest | gzip > fakehttp_amd64.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: fakehttp_amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
